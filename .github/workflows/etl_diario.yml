name: ETL Opciones Diario

on:
  schedule:
    # Ejecutar a las 12:00 UTC (6:00 AM CST) de Lunes a Viernes
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # Este comando nos permite poner un boton en GitHub para correrlo manualmente cuando queramos

jobs:
  extraer_y_guardar_datalake:
    runs-on: ubuntu-latest

    env:
      PIPELINE_START: ${{ github.event.repository.updated_at }}

    steps:
    - name: 1. Descargar el codigo del repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalar dependencias del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Inyectar llave secreta de Google Cloud
      env:
        GCP_SECRETO: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        echo "$GCP_SECRETO" > gcp_credentials.json

    - name: 4b. Registrar tiempo de inicio
      run: echo "PIPELINE_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

    - name: 5. Ejecutar ETL de Precios
      run: python scripts/etl_precios.py

    - name: 6. Ejecutar ETL de Opciones
      run: python scripts/etl_opciones.py

    - name: 7. Ejecutar ETL Macro (FRED/Yahoo)
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python scripts/etl_macro.py

    - name: 8. Ejecutar ETL Sentimiento (FinBERT)
      env:
        HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
      run: python scripts/etl_sentiment.py

    - name: 9. Ejecutar ETL Earnings (Calendario)
      run: python scripts/etl_earnings.py
    
    - name: 9b. Ejecutar Transformacion Capa Plata (Griegas)
      env:
        GCP_SECRETO: ${{ secrets.GCP_CREDENTIALS }}
      run: python scripts/transformacion_plata.py

    - name: 10. Notificar Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scripts/notificar_pipeline.py --inicio "${{ env.PIPELINE_START }}"