name: ETL Opciones Diario

on:
  schedule:
    # Ejecutar a las 12:00 UTC (6:00 AM CST) de Lunes a Viernes
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  extraer_y_guardar_datalake:
    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: 1

    steps:
    - name: 1. Descargar el codigo del repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalar dependencias del proyecto
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Inyectar llave secreta de Google Cloud
      env:
        GCP_SECRETO: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        echo "$GCP_SECRETO" > gcp_credentials.json

    - name: 4b. Registrar tiempo de inicio
      run: echo "PIPELINE_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

    - name: 5. Ejecutar ETL de Precios
      continue-on-error: true
      run: python scripts/etl_precios.py

    - name: 6. Ejecutar ETL de Opciones
      continue-on-error: true
      run: python scripts/etl_opciones.py

    - name: 7. Ejecutar ETL Macro (FRED/Yahoo)
      continue-on-error: true
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python scripts/etl_macro.py

    - name: 8. Ejecutar ETL Sentimiento (RSS + FinBERT)
      continue-on-error: true
      env:
        HF_TOKEN: ${{ secrets.HF_API_TOKEN }}
      run: |
        python scripts/extraccion_sentimiento.py
        if [ -f alertas_api.txt ]; then
          echo "API_ERRORS=$(cat alertas_api.txt)" >> $GITHUB_ENV
        else
          echo "API_ERRORS=" >> $GITHUB_ENV
        fi

    - name: 9. Ejecutar ETL Earnings (Calendario)
      continue-on-error: true
      run: python scripts/extraccion_earnings.py
    
    - name: 10. Ejecutar Transformacion Capa Plata (Total GEX y Feature Store)
      run: python scripts/transformacion_plata.py

    - name: 11. Notificar Telegram
      if: always()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python scripts/notificar_pipeline.py \
          --inicio "${{ env.PIPELINE_START }}" \
          --run_id "${{ github.run_id }}" \
          --errores "${{ env.API_ERRORS }}"